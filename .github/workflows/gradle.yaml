name: Kotlin CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Kotlin 2.x loves Java 21
          distribution: 'temurin'
          cache: 'gradle' # Automatically caches dependencies to speed up future runs

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test